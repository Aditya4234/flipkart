<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flipkart </title>
  <link rel="stylesheet" href="style.css"/>
  
</head>
<body>
  <header class="main-header">
    <div class="logo">Flipkart</div>
    <p>Deliver to India</p>
    <input type="text" id="searchBox" placeholder="Search for products, brands and more" />
    <button class="btn">Search</button>
  </header>
  <div class="navbar">
    <nav>
      <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#login" id="loginBtn">Login</a></li>
        <li><a href="#contact">Contact Us</a></li>
      </ul>
    </nav>
  </div>

  
  <div id="loginModal" class="modal">
    <div class="modal-content">
      <span class="closeBtn">&times;</span>
      <h2>Login</h2>
      <form>
        <label for="username">Username:</label><br>
        <input type="text" id="username" name="username"><br><br>

        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password"><br><br>

        <button type="submit">Login</button>
      </form>
    </div>
  </div>


  <div class="logo-banner">
    <img src="img/image.webp" alt="Flipkart Logo" />
  </div>
  <main>
    <div class="product-list" id="productList">
      <div class="product">
        <img src="img/vivo-v29-5g.png" alt="Vivo-V29-5G" />
      </div>
      <div class="product">
        <img src="img/iphone-13-128GB.jpeg" alt="iPhone 13 128GB" />
      </div>
      <div class="product">
        <img src="img/Samsung-Galaxy-M56.webp" alt="Samsung Galaxy M56" />
      </div>
      <div class="product">
        <img src="img/vivo-t1-5g.webp" alt="Vivo T1 5G" />
      </div>
      <div class="product">
        <img src="img/vivo-v29-5g.png" alt="Vivo V29 5G" />
      </div>
      <div class="product">
        <img src="img/Samsung-Galaxy-M56.webp" alt="Samsung Galaxy M56" />
      </div>
    </div>
  </main>
  <footer>
    <ul>
      <li><a href="#">About</a></li>
      <li><a href="#">Product List</a></li>
      <li><a href="#">Contact Us</a></li>
      <li><a href="#">Services</a></li>
    </ul>
  </footer>

  <script src="script.js"></script>
</body>
</html>
